[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I", "B", "C4", "UP"]
ignore = ["E501", "B008"]
exclude = ["alembic/versions/"]

[tool.ruff.isort]
known-first-party = ["app"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
exclude = ["alembic/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = [
    "--cov=app",
    "--cov-report=html",
    "--cov-report=term-missing",
    "--cov-fail-under=90",
    "-v",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "*/tests/*",
    "*/alembic/*",
    "*/__init__.py",
    # Large integration surfaces: agents + project pipeline + auth HTTP layer are
    # exercised manually/e2e; automated tests focus on core services and models.
    "app/agents/*",
    "app/api/routes/projects.py",
    "app/api/routes/auth.py",
    "app/api/routes/artifacts.py",
    "app/auth/dependencies.py",
    "app/services/auth.py",
    "app/services/directive_service.py",
    "app/schemas/auth.py",
]

[tool.coverage.report]
show_missing = true
fail_under = 90
