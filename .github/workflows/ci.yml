name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  AWS_REGION:          us-east-1
  ECR_BACKEND_REPO:    agentforge-prod-backend
  ECR_FRONTEND_REPO:   agentforge-prod-frontend
  ECS_CLUSTER:         agentforge-prod-cluster
  BACKEND_SERVICE:     agentforge-prod-backend
  FRONTEND_SERVICE:    agentforge-prod-frontend
  BACKEND_TASK_FAMILY: agentforge-prod-backend

permissions:
  id-token:      write   # Required for OIDC
  contents:      read
  pull-requests: write
  security-events: write

jobs:
  # ─── Backend Tests ──────────────────────────────────────────────────────────

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       agentforge_test
          POSTGRES_USER:     agentforge
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U agentforge"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run Ruff linter
        working-directory: backend
        run: ruff check app/ tests/

      - name: Run MyPy type checker
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

      - name: Run tests with coverage
        working-directory: backend
        env:
          APP_ENV:              test
          TEST_DATABASE_URL:    postgresql+asyncpg://agentforge:password@localhost:5432/agentforge_test
          DATABASE_URL:         postgresql+asyncpg://agentforge:password@localhost:5432/agentforge_test
          DATABASE_SYNC_URL:    postgresql+psycopg://agentforge:password@localhost:5432/agentforge_test
          REDIS_URL:            redis://localhost:6379/0
          AWS_REGION:           us-east-1
          AWS_DEFAULT_REGION:   us-east-1
          SECRET_KEY:           test-secret-key-minimum-32-chars-long
          S3_BUCKET_NAME:       agentforge-test-bucket
          BEDROCK_MODEL_ID:     anthropic.claude-3-5-sonnet-20241022-v2:0
          BEDROCK_FAST_MODEL_ID: anthropic.claude-3-5-haiku-20241022-v1:0
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -v

      - name: Upload backend coverage
        uses: codecov/codecov-action@v4
        with:
          file:  backend/coverage.xml
          flags: backend
        continue-on-error: true

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: backend/coverage.xml
        continue-on-error: true

  # ─── Frontend Tests ──────────────────────────────────────────────────────────

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v4
        with:
          file:  frontend/coverage/coverage-final.json
          flags: frontend
        continue-on-error: true

  # ─── Security Scanning ────────────────────────────────────────────────────────

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:  "fs"
          scan-ref:   "."
          format:     "sarif"
          output:     "trivy-results.sarif"
          severity:   "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  # ─── Build and Push Docker Images ─────────────────────────────────────────────

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, security-scan]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    outputs:
      backend-image:  ${{ steps.backend-meta.outputs.tags }}
      frontend-image: ${{ steps.frontend-meta.outputs.tags }}
      image-tag:      ${{ steps.image-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: image-tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${GITHUB_SHA::8}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        id: push-backend
        uses: docker/build-push-action@v6
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          platforms:  linux/amd64
          tags:       ${{ steps.backend-meta.outputs.tags }}
          labels:     ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend

      - name: Frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile
          push:       true
          platforms:  linux/amd64
          tags:       ${{ steps.frontend-meta.outputs.tags }}
          labels:     ${{ steps.frontend-meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend

  # ─── Deploy to Production ─────────────────────────────────────────────────────

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    environment:
      name: production
      url:  ${{ secrets.APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run database migrations
        run: |
          # Run Alembic migrations as an ECS one-off task
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$BACKEND_TASK_FAMILY" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[${{ secrets.PRIVATE_SUBNET_IDS }}],
              securityGroups=[${{ secrets.BACKEND_SG_ID }}],
              assignPublicIp=DISABLED
            }" \
            --overrides '{
              "containerOverrides": [{
                "name": "backend",
                "command": ["alembic", "upgrade", "head"]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: $TASK_ARN"

          # Wait for migration to complete
          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN"

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Migration exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrations completed successfully"

      - name: Update backend ECS service
        run: |
          aws ecs update-service \
            --cluster  "$ECS_CLUSTER" \
            --service  "$BACKEND_SERVICE" \
            --force-new-deployment \
            --output text \
            --query 'service.status'

      - name: Update frontend ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$FRONTEND_SERVICE" \
            --force-new-deployment \
            --output text \
            --query 'service.status'

      - name: Wait for backend deployment
        run: |
          echo "Waiting for backend service to stabilise..."
          aws ecs wait services-stable \
            --cluster  "$ECS_CLUSTER" \
            --services "$BACKEND_SERVICE"

      - name: Wait for frontend deployment
        run: |
          echo "Waiting for frontend service to stabilise..."
          aws ecs wait services-stable \
            --cluster  "$ECS_CLUSTER" \
            --services "$FRONTEND_SERVICE"

      - name: Smoke test
        run: |
          APP_URL="${{ secrets.APP_URL }}"
          HEALTH_URL="${APP_URL}/api/v1/health"
          echo "Health check: $HEALTH_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Deployment healthy ✅"

      - name: Rollback backend on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back backend..."
          PREVIOUS_TD=$(aws ecs describe-services \
            --cluster  "$ECS_CLUSTER" \
            --services "$BACKEND_SERVICE" \
            --query    'services[0].deployments[1].taskDefinition' \
            --output   text 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TD" ] && [ "$PREVIOUS_TD" != "None" ]; then
            aws ecs update-service \
              --cluster         "$ECS_CLUSTER" \
              --service         "$BACKEND_SERVICE" \
              --task-definition "$PREVIOUS_TD"
            echo "Rolled back to: $PREVIOUS_TD"
          else
            echo "No previous deployment found to roll back to"
          fi
